<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>闈場扣分官：全國語文競賽寫字組模擬檢定</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;900&family=Noto+Sans+TC:wght@300;400;700&display=swap');
        :root {
            --paper: #f7f4ed;
            --ink: #1a1a1a;
            --seal: #b91c1c;
            --grid: rgba(185, 28, 28, 0.2);
        }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--paper);
            color: var(--ink);
            background-image: radial-gradient(#e5e1d7 1px, transparent 0);
            background-size: 20px 20px;
        }
        .serif-font { font-family: 'Noto Serif TC', serif; }
        .米字格 {
            border: 2px solid var(--seal);
            position: relative;
            background-color: white;
            transition: all 0.3s ease;
        }
        .米字格::before {
            content: ''; position: absolute; top: 0; left: 50%; width: 1px; height: 100%;
            border-left: 1px dashed var(--grid);
        }
        .米字格::after {
            content: ''; position: absolute; top: 50%; left: 0; height: 1px; width: 100%;
            border-top: 1px dashed var(--grid);
        }
        .diagonal-line {
            position: absolute; width: 141%; height: 1px;
            border-top: 1px dashed var(--grid);
            top: 0; left: 0; transform-origin: top left; transform: rotate(45deg);
        }
        .diagonal-line-rev {
            position: absolute; width: 141%; height: 1px;
            border-top: 1px dashed var(--grid);
            bottom: 0; left: 0; transform-origin: bottom left; transform: rotate(-45deg);
        }
        .seal-btn {
            border: 2px solid var(--seal);
            color: var(--seal);
            transition: all 0.2s;
        }
        .seal-btn:hover { background-color: var(--seal); color: white; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <!-- Chosen Palette: Ink & Seal (Warm Paper #f7f4ed, Ink Black #1a1a1a, Seal Red #b91c1c) -->
    <!-- Application Structure Plan: A single-page interactive game ("The Judge's Enclosure"). It uses a state-based layout to transition between the Start Screen, the Active Judging phase, Feedback popups, and a Final Evaluation. This structure is chosen to directly immerse the user in the "Compliance vs. Artistry" conflict mentioned in the report, making the qualitative insights about "Standard Characters" and "Variant/Artistic Characters" tangible through play. -->
    <!-- Visualization & Content Choices: 
        1. Calligraphy Grid: Built with CSS Grid and pseudo-elements (No SVG) to represent the 7/8cm boundary.
        2. Dynamic Feedback: JS arrays store report-derived data about智永, 橆, and stroke omission to educate the user after each choice.
        3. Character Styling: CSS transforms/scaling to simulate "out of bounds" or "artistic style" without external assets.
        4. No Mermaid/SVG: Confirmed. 
    -->
    <!-- CONFIRMATION: NO SVG graphics used. NO Mermaid JS used. -->

    <div class="max-w-xl w-full mt-10 bg-white/60 backdrop-blur shadow-2xl rounded-3xl border border-stone-200 overflow-hidden">
        <header class="p-6 border-b border-stone-200 text-center">
            <h1 class="serif-font text-3xl font-black tracking-widest">闈場扣分官</h1>
            <p class="text-xs text-stone-500 mt-2 tracking-widest uppercase">全國語文競賽・寫字組審查模擬</p>
        </header>

        <div id="game-container" class="p-8">
            <!-- Start Screen -->
            <div id="start-view" class="text-center space-y-6">
                <div class="py-10">
                    <div class="inline-block border-4 border-red-700 p-4 rotate-[-5deg] mb-6">
                        <span class="serif-font text-red-700 text-2xl font-black">闈場專用印</span>
                    </div>
                    <h2 class="serif-font text-xl font-bold">你能成為稱職的「國家級」評審嗎？</h2>
                    <p class="text-stone-600 text-sm mt-4 leading-relaxed px-4">
                        語文競賽強調「絕對實用符規」。<br>任何流露個人美感、少一筆、或寫成古代大師帖字的「藝術神作」，在闈場內一律判定扣分！
                    </p>
                </div>
                <button onclick="startGame()" class="w-full py-4 bg-stone-900 text-white rounded-xl font-bold tracking-widest hover:bg-stone-800 transition transform active:scale-95">
                    開始審查 ➔
                </button>
            </div>

            <!-- Play Screen -->
            <div id="play-view" class="hidden space-y-8">
                <div class="flex justify-between items-center text-xs font-bold text-stone-400">
                    <span>進度：<span id="current-idx">1</span> / 7</span>
                    <span>目前審查分：<span id="score" class="text-red-700">0</span></span>
                </div>

                <div class="flex justify-center py-4">
                    <div id="grid-box" class="米字格 w-64 h-64 flex items-center justify-center overflow-hidden">
                        <div class="diagonal-line"></div>
                        <div class="diagonal-line-rev"></div>
                        <span id="main-char" class="serif-font text-[9rem] font-black z-10 transition-all duration-300">無</span>
                    </div>
                </div>

                <div class="text-center space-y-2">
                    <p class="text-sm font-medium text-stone-700">請判斷此作品是否符規？</p>
                    <p class="text-[10px] text-stone-400">（注意：檢查是否有帖字、漏筆或出格情形）</p>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <button onclick="checkAnswer(false)" class="py-4 rounded-xl border-2 border-red-700 text-red-700 font-bold hover:bg-red-50 transition">❌ 違規扣分</button>
                    <button onclick="checkAnswer(true)" class="py-4 rounded-xl bg-stone-900 text-white font-bold hover:bg-stone-800 transition">✅ 符規通過</button>
                </div>
            </div>

            <!-- Feedback Screen -->
            <div id="feedback-view" class="hidden text-center space-y-6 py-4">
                <div id="feedback-icon" class="text-4xl"></div>
                <h3 id="feedback-title" class="serif-font text-2xl font-bold"></h3>
                <p id="feedback-text" class="text-stone-600 text-sm leading-relaxed"></p>
                <button onclick="nextQuestion()" class="w-full py-4 bg-stone-100 text-stone-800 rounded-xl font-bold hover:bg-stone-200 transition">下一題</button>
            </div>

            <!-- Result Screen -->
            <div id="result-view" class="hidden text-center space-y-8 py-6">
                <div class="inline-block border-2 border-red-700 px-6 py-2 rotate-[-3deg]">
                    <span id="result-rank" class="serif-font text-red-700 text-xl font-black"></span>
                </div>
                <div>
                    <p class="text-xs text-stone-400">最終審查積分</p>
                    <h2 id="final-score" class="serif-font text-6xl font-black text-stone-900 mt-2">0</h2>
                </div>
                <p id="result-desc" class="text-stone-600 text-sm leading-relaxed px-4"></p>
                <button onclick="location.reload()" class="w-full py-4 bg-stone-900 text-white rounded-xl font-bold transition hover:bg-stone-800">重新挑戰</button>
            </div>
        </div>
    </div>

    <footer class="mt-10 text-[10px] text-stone-400 tracking-widest text-center">
        數位微專題：語文競賽與書法教育思辨<br>© 2026 闈場模擬系統
    </footer>

    <script>
        const questions = [
            { char: "無", style: "scale(1)", isOk: true, msg: "這是標準的教育部標準字，平正穩重且收在格子內，是競賽中最保險的寫法。" },
            { char: "橆", style: "scale(1.05)", isOk: false, msg: "雖然這是王羲之碑帖中極美的『帖字』，但在語文競賽中一律被視為異體錯字，必須扣重分！" },
            { char: "書", style: "scale(1)", isOk: true, msg: "完美的唐楷智永風。近年評審偏好秀雅的唐楷，這種規正的字體在賽場極具優勢。" },
            { char: "書", style: "translate(30px, 30px) rotate(5deg) scale(1.1)", isOk: false, msg: "字體已嚴重『越界』！大會規定字體需控制在格子比例內，一旦出格，第一眼就會被刷掉。" },
            { char: "華", style: "scale(1)", isOk: true, msg: "一筆一畫清清楚楚，完全符合標準楷書的『正確性』要求。" },
            { char: "華", style: "scale(0.95)", isOk: false, msg: "細看！這使用了古碑帖的省筆寫法，少了一橫。在藝術上是流暢，但在競賽中算『漏筆』。" },
            { char: "智", style: "scale(1)", isOk: true, msg: "典型的智永楷書體，目前全國語文競賽最熱門的『得獎主流』字風。" }
        ];

        let currentIdx = 0;
        let score = 0;

        function startGame() {
            document.getElementById('start-view').classList.add('hidden');
            document.getElementById('play-view').classList.remove('hidden');
            loadQuestion();
        }

        function loadQuestion() {
            const q = questions[currentIdx];
            document.getElementById('current-idx').innerText = currentIdx + 1;
            document.getElementById('score').innerText = score;
            const charEl = document.getElementById('main-char');
            charEl.innerText = q.char;
            charEl.style.transform = q.style;
        }

        function checkAnswer(userChoice) {
            const q = questions[currentIdx];
            const isCorrect = (userChoice === q.isOk);
            if (isCorrect) score += 10;

            document.getElementById('play-view').classList.add('hidden');
            document.getElementById('feedback-view').classList.remove('hidden');
            
            document.getElementById('feedback-icon').innerText = isCorrect ? "🎯" : "❌";
            document.getElementById('feedback-title').innerText = isCorrect ? "判定正確" : "判定失誤";
            document.getElementById('feedback-text').innerText = q.msg;
        }

        function nextQuestion() {
            currentIdx++;
            if (currentIdx < questions.length) {
                document.getElementById('feedback-view').classList.add('hidden');
                document.getElementById('play-view').classList.remove('hidden');
                loadQuestion();
            } else {
                showResult();
            }
        }

        function showResult() {
            document.getElementById('feedback-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            let rank = "";
            let desc = "";
            if (score >= 60) {
                rank = "科舉級評審";
                desc = "你已完全融入語文競賽的規訓邏輯！在你眼中，標準與規則重於一切，任何藝術美感只要出格，都逃不過你的法眼。";
            } else if (score >= 30) {
                rank = "凡心未泯評審";
                desc = "你在標準與藝術間掙扎。你知道有些字寫得極美，卻因為規則必須扣分，你的一絲憐憫讓你無法成為最冷酷的評審。";
            } else {
                rank = "藝術狂熱叛徒";
                desc = "你顯然無法忍受框架！你對古碑帖與自由筆勢的熱愛遠超過死板的規範，你比較適合去美術館或當代美展。";
            }
            document.getElementById('result-rank').innerText = rank;
            document.getElementById('result-desc').innerText = desc;
        }
    </script>
</body>
</html>
